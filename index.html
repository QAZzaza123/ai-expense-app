<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小豪的記帳小幫手</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Arial,"Microsoft JhengHei";background:#f4f7fb;color:#222}
header{background:#1f4e79;color:white;padding:18px;text-align:center;font-size:24px;font-weight:bold}
.container{padding:15px;max-width:900px;margin:auto}
.card{background:white;border-radius:14px;padding:15px;margin-bottom:15px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
input,select{width:100%;box-sizing:border-box;padding:13px;font-size:18px;border:1px solid #ccc;border-radius:10px;margin-bottom:10px}
button{width:100%;margin-top:10px;padding:13px;border:none;border-radius:10px;background:#1f4e79;color:white;font-size:18px}
button.red{background:#c0392b}
button.small{width:auto;padding:6px 10px;font-size:14px;background:#e74c3c}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.box{background:#eef5fb;border-radius:12px;padding:12px;text-align:center;font-weight:bold}
.item{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #ddd;padding:10px 0}
canvas{max-width:100%}
.hint{font-size:14px;color:#666;line-height:1.6}
</style>
</head>

<body>
<header>小豪的記帳小幫手</header>

<div class="container">

<div class="card">
<h3>新增帳戶</h3>
<input id="accName" placeholder="帳戶名稱：玉山、台新、現金">
<input id="accMoney" placeholder="初始金額">
<button onclick="addAccount()">新增帳戶</button>
</div>

<div class="card">
<h3>新增紀錄</h3>
<input id="input" placeholder="早餐60現 / 薪水30000玉山 / 轉帳5000玉山到台新 / 薪水14000玉山到股票帳戶">
<button onclick="add()">新增</button>
<p class="hint">
收入：薪水30000玉山<br>
支出：早餐60現<br>
轉帳：轉帳5000玉山到台新<br>
投資：薪水14000玉山到股票帳戶
</p>
</div>

<div class="card">
<h3>月份切換</h3>
<select id="monthSelect" onchange="render()"></select>
</div>

<div class="card">
<h3>帳戶餘額（會延續到下個月）</h3>
<div id="assets" class="grid"></div>
</div>

<div class="card">
<h3>每月收支統計</h3>
<div id="summary" class="grid"></div>
</div>

<div class="card">
<h3>分類統計</h3>
<div id="category" class="grid"></div>
</div>

<div class="card">
<h3>本月支出圓餅圖</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>本月紀錄</h3>
<div id="list"></div>
<button class="red" onclick="clearAll()">清除全部資料</button>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("moneyDataMonth")) || [];
let accounts = JSON.parse(localStorage.getItem("moneyAccountsMonth")) || {};
let pieChart = null;

function getMonth(){
  let d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}

function today(){
  return new Date().toLocaleDateString("zh-TW");
}

function normalizeAccount(name){
  if(!name) return "銀行";
  name = name.trim();
  if(name==="現") return "現金";
  if(name==="銀") return "銀行";
  if(name==="信") return "信用卡";
  if(name==="悠") return "悠遊卡";
  if(name==="L") return "LINE Pay";
  return name;
}

function classify(name){
  if(/早餐|午餐|晚餐|飲料|便當|咖啡|麵|飯/.test(name)) return "餐飲";
  if(/公車|捷運|高鐵|火車|交通|油錢|Uber/.test(name)) return "交通";
  if(/電影|遊戲|娛樂|Netflix|KTV/.test(name)) return "娛樂";
  if(/購物|衣服|鞋子|包包|生活用品/.test(name)) return "購物";
  if(/房租|房貸|保險|電費|水費|手機費/.test(name)) return "固定支出";
  if(/醫療|看病|藥/.test(name)) return "醫療";
  return "其他";
}

function save(){
  localStorage.setItem("moneyDataMonth",JSON.stringify(data));
  localStorage.setItem("moneyAccountsMonth",JSON.stringify(accounts));
}

function addAccount(){
  let name = document.getElementById("accName").value.trim();
  let money = parseInt(document.getElementById("accMoney").value) || 0;

  if(!name) return alert("請輸入帳戶名稱");

  accounts[name] = (accounts[name] || 0) + money;

  document.getElementById("accName").value="";
  document.getElementById("accMoney").value="";

  save();
  render();
}

function parse(text){
  let num = text.match(/\d+/);
  if(!num) return null;

  let amount = parseInt(num[0]);
  let date = today();
  let month = getMonth();

  if(text.includes("到股票帳戶")){
    let clean = text.replace("到股票帳戶","");
    let parts = clean.split(amount);
    let name = parts[0].trim() || "投入股票帳戶";
    let account = normalizeAccount(parts[1]);

    return {type:"投資",name,amount,account,category:"投資",date,month};
  }

  if(text.includes("轉帳") && text.includes("到")){
    let clean = text.replace("轉帳","").replace(amount,"");
    let parts = clean.split("到");

    return {
      type:"轉帳",
      amount,
      from:normalizeAccount(parts[0]),
      to:normalizeAccount(parts[1]),
      date,
      month
    };
  }

  let parts = text.split(amount);
  let name = parts[0].trim();
  let account = normalizeAccount(parts[1]);

  if(/薪水|收入|獎金|打工|退款|零用錢|利息/.test(name)){
    return {type:"收入",name,amount,account,date,month};
  }

  return {type:"支出",name,amount,account,category:classify(name),date,month};
}

function add(){
  let input = document.getElementById("input");
  let text = input.value.trim();
  let r = parse(text);

  if(!r) return alert("格式錯誤");

  data.push(r);

  if(r.type==="收入"){
    accounts[r.account]=(accounts[r.account]||0)+r.amount;
  }

  if(r.type==="支出"){
    accounts[r.account]=(accounts[r.account]||0)-r.amount;
  }

  if(r.type==="轉帳"){
    accounts[r.from]=(accounts[r.from]||0)-r.amount;
    accounts[r.to]=(accounts[r.to]||0)+r.amount;
  }

  if(r.type==="投資"){
    accounts[r.account]=(accounts[r.account]||0)-r.amount;
    accounts["股票帳戶"]=(accounts["股票帳戶"]||0)+r.amount;
  }

  input.value="";
  save();
  updateMonthOptions();
  render();
}

function updateMonthOptions(){
  let select = document.getElementById("monthSelect");
  let old = select.value;

  let months = [...new Set(data.map(d=>d.month))].sort().reverse();
  let now = getMonth();

  if(!months.includes(now)) months.unshift(now);

  select.innerHTML="";
  months.forEach(m=>{
    let opt=document.createElement("option");
    opt.value=m;
    opt.textContent=m;
    select.appendChild(opt);
  });

  select.value = months.includes(old) ? old : now;
}

function selectedMonth(){
  return document.getElementById("monthSelect").value;
}

function monthData(){
  let m = selectedMonth();
  return data.map((d,i)=>({...d,realIndex:i})).filter(d=>d.month===m);
}

function clearAll(){
  if(confirm("確定清除全部資料嗎？")){
    data=[];
    accounts={};
    save();
    updateMonthOptions();
    render();
  }
}

function del(i){
  let r = data[i];

  if(r.type==="收入") accounts[r.account]-=r.amount;
  if(r.type==="支出") accounts[r.account]+=r.amount;
  if(r.type==="轉帳"){
    accounts[r.from]+=r.amount;
    accounts[r.to]-=r.amount;
  }
  if(r.type==="投資"){
    accounts[r.account]+=r.amount;
    accounts["股票帳戶"]-=r.amount;
  }

  data.splice(i,1);
  save();
  updateMonthOptions();
  render();
}

function renderAssets(){
  let html="";
  let total=0;

  Object.keys(accounts).forEach(k=>{
    html += `<div class="box">${k}<br>${accounts[k]}元</div>`;
    total += accounts[k];
  });

  html += `<div class="box">總資產<br>${total}元</div>`;

  document.getElementById("assets").innerHTML = html || "<p>目前沒有帳戶資料</p>";
}

function renderSummary(){
  let f = monthData();

  let income = f.filter(d=>d.type==="收入").reduce((s,d)=>s+d.amount,0);
  let expense = f.filter(d=>d.type==="支出").reduce((s,d)=>s+d.amount,0);
  let invest = f.filter(d=>d.type==="投資").reduce((s,d)=>s+d.amount,0);
  let transfer = f.filter(d=>d.type==="轉帳").reduce((s,d)=>s+d.amount,0);

  document.getElementById("summary").innerHTML = `
    <div class="box">本月收入<br>${income}元</div>
    <div class="box">本月支出<br>${expense}元</div>
    <div class="box">本月投資<br>${invest}元</div>
    <div class="box">本月轉帳<br>${transfer}元</div>
    <div class="box">本月結餘<br>${income-expense-invest}元</div>
  `;
}

function getCategoryTotals(){
  let f = monthData();
  let cats={餐飲:0,交通:0,娛樂:0,購物:0,固定支出:0,醫療:0,其他:0,投資:0};

  f.forEach(d=>{
    if(d.type==="支出") cats[d.category]+=d.amount;
    if(d.type==="投資") cats["投資"]+=d.amount;
  });

  return cats;
}

function renderCategory(){
  let cats = getCategoryTotals();
  let html="";

  Object.keys(cats).forEach(k=>{
    html += `<div class="box">${k}<br>${cats[k]}元</div>`;
  });

  document.getElementById("category").innerHTML=html;
}

function renderChart(){
  let cats = getCategoryTotals();
  let labels=[];
  let values=[];

  Object.keys(cats).forEach(k=>{
    if(cats[k]>0){
      labels.push(k);
      values.push(cats[k]);
    }
  });

  if(pieChart) pieChart.destroy();

  if(values.length===0) return;

  pieChart = new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{labels:labels,datasets:[{data:values}]},
    options:{responsive:true,plugins:{legend:{position:"bottom"}}}
  });
}

function renderList(){
  let f = monthData();
  let html="";

  f.forEach(d=>{
    let text="";

    if(d.type==="收入") text=`收入｜${d.name}｜${d.amount}元｜${d.account}`;
    if(d.type==="支出") text=`支出｜${d.name}｜${d.amount}元｜${d.category}｜${d.account}`;
    if(d.type==="轉帳") text=`轉帳｜${d.amount}元｜${d.from} → ${d.to}`;
    if(d.type==="投資") text=`投資｜股票帳戶 +${d.amount}元｜${d.account}扣款`;

    html += `
      <div class="item">
        <div>
          <b>${text}</b><br>
          <small>${d.date}</small>
        </div>
        <button class="small" onclick="del(${d.realIndex})">刪除</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html || "<p>本月沒有紀錄</p>";
}

function render(){
  renderAssets();
  renderSummary();
  renderCategory();
  renderChart();
  renderList();
}

updateMonthOptions();
render();
</script>

</body>
</html>
