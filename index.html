<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI記帳App</title>
</head>
<body>

<h2>AI智慧記帳</h2>

<input id="input" placeholder="例如 早餐60信">
<button onclick="add()">新增</button>

<ul id="list"></ul>

<script>
function add(){
let text=document.getElementById("input").value;
let num=text.match(/\d+/);
if(!num)return alert("格式錯誤");

let amount=parseInt(num[0]);
let item=text.replace(/\d+/,"");

let li=document.createElement("li");
li.innerText=item+" "+amount;

document.getElementById("list").appendChild(li);
}
</script>

</body>
</html>
