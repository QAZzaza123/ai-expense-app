<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI智慧記帳App｜收支帳戶版</title>

<style>
body{
  margin:0;
  font-family:Arial,"Microsoft JhengHei",sans-serif;
  background:#f4f7fb;
  color:#222;
}
header{
  background:#1f4e79;
  color:white;
  padding:18px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}
.container{
  padding:15px;
  max-width:900px;
  margin:auto;
}
.card{
  background:white;
  border-radius:14px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}
input,select{
  width:100%;
  box-sizing:border-box;
  padding:13px;
  font-size:18px;
  border:1px solid #ccc;
  border-radius:10px;
  margin-bottom:10px;
}
button{
  width:100%;
  margin-top:10px;
  padding:13px;
  border:none;
  border-radius:10px;
  background:#1f4e79;
  color:white;
  font-size:18px;
}
button.red{
  background:#c0392b;
}
.summary{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.box{
  background:#eef5fb;
  border-radius:12px;
  padding:12px;
  text-align:center;
  font-weight:bold;
}
.ai{
  background:#fff7e6;
  border-left:6px solid #f0a500;
  padding:12px;
  border-radius:10px;
  line-height:1.7;
}
.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ddd;
  padding:10px 0;
}
.item small{
  color:#666;
}
.delete{
  background:#e74c3c;
  width:auto;
  padding:6px 10px;
  font-size:14px;
}
.hint{
  color:#666;
  font-size:14px;
  line-height:1.6;
}
.income{
  color:#1e8449;
}
.expense{
  color:#c0392b;
}
.transfer{
  color:#1f4e79;
}
</style>
</head>

<body>

<header>AI智慧記帳App｜收支帳戶版</header>

<div class="container">

  <div class="card">
    <h3>新增紀錄</h3>
    <input id="input" placeholder="例如：早餐60現、薪水30000銀、轉帳1000銀到現">
    <button onclick="addRecord()">新增</button>
    <p class="hint">
      支付 / 帳戶代碼：現=現金、信=信用卡、銀=銀行、悠=悠遊卡、L=LINE Pay<br>
      支出：早餐60現｜收入：薪水30000銀｜轉帳：轉帳1000銀到現
    </p>
  </div>

  <div class="card">
    <h3>月份選擇</h3>
    <select id="monthSelect" onchange="render()"></select>
  </div>

  <div class="card">
    <h3>本月收支統計</h3>
    <div class="summary" id="summary"></div>
  </div>

  <div class="card">
    <h3>帳戶餘額</h3>
    <div class="summary" id="accounts"></div>
  </div>

  <div class="card">
    <h3>AI分析建議</h3>
    <div class="ai" id="ai">目前尚無資料，請先新增紀錄。</div>
  </div>

  <div class="card">
    <h3>支出表</h3>
    <div id="expenseList"></div>
  </div>

  <div class="card">
    <h3>收入表</h3>
    <div id="incomeList"></div>
  </div>

  <div class="card">
    <h3>轉帳紀錄</h3>
    <div id="transferList"></div>
  </div>

  <div class="card">
    <button class="red" onclick="clearAll()">清除全部資料</button>
  </div>

</div>

<script>
let records = JSON.parse(localStorage.getItem("moneyRecords")) || [];

function getMonthKey(dateObj){
  let y = dateObj.getFullYear();
  let m = String(dateObj.getMonth()+1).padStart(2,"0");
  return `${y}-${m}`;
}

function accountName(code){
  if(code==="現") return "現金";
  if(code==="信") return "信用卡";
  if(code==="銀") return "銀行";
  if(code==="悠") return "悠遊卡";
  if(code==="L") return "LINE Pay";
  return "現金";
}

function classify(name){
  if(/早餐|午餐|晚餐|飲料|便當|咖啡|麵|飯/.test(name)) return "餐飲";
  if(/公車|捷運|高鐵|火車|交通|油錢|Uber/.test(name)) return "交通";
  if(/娛樂|電影|遊戲|Netflix|KTV|唱歌/.test(name)) return "娛樂";
  if(/購物|衣服|鞋子|包包|生活用品/.test(name)) return "購物";
  if(/股票|ETF|基金|投資/.test(name)) return "投資";
  if(/房租|房貸|保險|電費|水費|手機費/.test(name)) return "固定支出";
  return "其他";
}

function parseInput(text){
  let now = new Date();
  let month = getMonthKey(now);
  let date = now.toLocaleDateString("zh-TW");

  let amountMatch = text.match(/\d+/);
  if(!amountMatch) return null;

  let amount = parseInt(amountMatch[0]);

  // 轉帳格式：轉帳1000銀到現
  if(text.includes("轉帳") && text.includes("到")){
    let fromCode = text.match(/(現|信|銀|悠|L)到/);
    let toCode = text.match(/到(現|信|銀|悠|L)/);

    if(!fromCode || !toCode) return null;

    return {
      type:"轉帳",
      date,
      month,
      name:"轉帳",
      amount,
      from:accountName(fromCode[1]),
      to:accountName(toCode[1])
    };
  }

  let accountCode = text.match(/現|信|銀|悠|L/);
  let account = accountCode ? accountName(accountCode[0]) : "現金";

  let name = text
    .replace(/\d+/g,"")
    .replace(/[現信銀悠L]/g,"")
    .trim();

  let incomeKeywords = /薪水|收入|獎金|打工|退款|零用錢|利息/;
  let type = incomeKeywords.test(name) ? "收入" : "支出";

  return {
    type,
    date,
    month,
    name,
    amount,
    account,
    category:type==="支出" ? classify(name) : "收入"
  };
}

function addRecord(){
  let input = document.getElementById("input");
  let text = input.value.trim();

  let record = parseInput(text);

  if(!record || record.name===""){
    alert("格式錯誤，請輸入例如：早餐60現、薪水30000銀、轉帳1000銀到現");
    return;
  }

  records.push(record);
  save();
  input.value="";
  updateMonthOptions();
  render();
}

function save(){
  localStorage.setItem("moneyRecords", JSON.stringify(records));
}

function updateMonthOptions(){
  let select = document.getElementById("monthSelect");
  let currentValue = select.value;

  let months = [...new Set(records.map(item => item.month))].sort().reverse();
  let currentMonth = getMonthKey(new Date());

  if(!months.includes(currentMonth)){
    months.unshift(currentMonth);
  }

  select.innerHTML = "";

  months.forEach(month=>{
    let option = document.createElement("option");
    option.value = month;
    option.textContent = month;
    select.appendChild(option);
  });

  select.value = months.includes(currentValue) ? currentValue : currentMonth;
}

function getFilteredRecords(){
  let selectedMonth = document.getElementById("monthSelect").value;
  return records.filter(item => item.month === selectedMonth);
}

function deleteRecord(indexInFiltered, type){
  let filtered = getFilteredRecords().filter(item => item.type === type);
  let target = filtered[indexInFiltered];

  let realIndex = records.findIndex(item =>
    JSON.stringify(item) === JSON.stringify(target)
  );

  if(realIndex !== -1){
    records.splice(realIndex,1);
    save();
    updateMonthOptions();
    render();
  }
}

function clearAll(){
  if(confirm("確定要清除全部資料嗎？")){
    records=[];
    save();
    updateMonthOptions();
    render();
  }
}

function getAccountBalances(){
  let accounts = {
    "現金":0,
    "銀行":0,
    "悠遊卡":0,
    "LINE Pay":0,
    "信用卡":0
  };

  records.forEach(item=>{
    if(item.type==="收入"){
      accounts[item.account] += item.amount;
    }

    if(item.type==="支出"){
      accounts[item.account] -= item.amount;
    }

    if(item.type==="轉帳"){
      accounts[item.from] -= item.amount;
      accounts[item.to] += item.amount;
    }
  });

  return accounts;
}

function render(){
  renderSummary();
  renderAccounts();
  renderLists();
  renderAI();
}

function renderSummary(){
  let filtered = getFilteredRecords();

  let income = filtered
    .filter(i=>i.type==="收入")
    .reduce((s,i)=>s+i.amount,0);

  let expense = filtered
    .filter(i=>i.type==="支出")
    .reduce((s,i)=>s+i.amount,0);

  let transfer = filtered
    .filter(i=>i.type==="轉帳")
    .reduce((s,i)=>s+i.amount,0);

  let balance = income - expense;

  let summary = document.getElementById("summary");
  summary.innerHTML = `
    <div class="box income">本月收入<br>${income}元</div>
    <div class="box expense">本月支出<br>${expense}元</div>
    <div class="box transfer">本月轉帳<br>${transfer}元</div>
    <div class="box">本月結餘<br>${balance}元</div>
  `;

  let categories = ["餐飲","交通","娛樂","購物","投資","固定支出","其他"];
  categories.forEach(cat=>{
    let sum = filtered
      .filter(i=>i.type==="支出" && i.category===cat)
      .reduce((s,i)=>s+i.amount,0);

    summary.innerHTML += `<div class="box">${cat}<br>${sum}元</div>`;
  });
}

function renderAccounts(){
  let balances = getAccountBalances();
  let accounts = document.getElementById("accounts");
  accounts.innerHTML = "";

  Object.keys(balances).forEach(acc=>{
    accounts.innerHTML += `
      <div class="box">${acc}<br>${balances[acc]}元</div>
    `;
  });
}

function renderLists(){
  renderList("支出","expenseList");
  renderList("收入","incomeList");
  renderList("轉帳","transferList");
}

function renderList(type,id){
  let list = document.getElementById(id);
  let filtered = getFilteredRecords().filter(item=>item.type===type);
  list.innerHTML = "";

  if(filtered.length===0){
    list.innerHTML = `<p>本月沒有${type}資料</p>`;
    return;
  }

  filtered.forEach((item,index)=>{
    if(type==="轉帳"){
      list.innerHTML += `
        <div class="item">
          <div>
            <b>${item.amount}元</b><br>
            <small>${item.date}｜${item.from} → ${item.to}</small>
          </div>
          <button class="delete" onclick="deleteRecord(${index},'${type}')">刪除</button>
        </div>
      `;
    }else{
      list.innerHTML += `
        <div class="item">
          <div>
            <b>${item.name}</b> ${item.amount}元<br>
            <small>${item.date}｜${item.category}｜${item.account}</small>
          </div>
          <button class="delete" onclick="deleteRecord(${index},'${type}')">刪除</button>
        </div>
      `;
    }
  });
}

function renderAI(){
  let filtered = getFilteredRecords();
  let ai = document.getElementById("ai");

  let expenses = filtered.filter(i=>i.type==="支出");

  if(expenses.length===0){
    ai.innerHTML = "本月尚無支出資料，請先新增紀錄。";
    return;
  }

  let categories = ["餐飲","交通","娛樂","購物","投資","固定支出","其他"];

  let result = categories.map(cat=>{
    return {
      cat,
      sum:expenses
        .filter(i=>i.category===cat)
        .reduce((s,i)=>s+i.amount,0)
    };
  });

  let max = result.reduce((a,b)=> b.sum>a.sum ? b : a);
  let totalExpense = expenses.reduce((s,i)=>s+i.amount,0);
  let percent = Math.round(max.sum / totalExpense * 100);

  let advice = percent >= 50
    ? `建議減少「${max.cat}」支出，避免單一類別花費過高。`
    : "目前本月支出結構正常，請持續保持。";

  ai.innerHTML = `
    本月最大支出類別：<b>${max.cat}</b><br>
    金額：<b>${max.sum}元</b><br>
    佔本月支出：約 <b>${percent}%</b><br>
    AI建議：${advice}
  `;
}

updateMonthOptions();
render();
</script>

</body>
</html>
