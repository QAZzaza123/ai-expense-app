<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小豪的記帳小幫手</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial,"Microsoft JhengHei";background:#f4f7fb;color:#222}
header{background:#1f4e79;color:white;padding:18px;text-align:center;font-size:24px;font-weight:bold}
.container{padding:15px;max-width:900px;margin:auto}
.card{background:white;border-radius:14px;padding:15px;margin-bottom:15px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
input,select{width:100%;box-sizing:border-box;padding:13px;font-size:18px;border:1px solid #ccc;border-radius:10px;margin-bottom:10px}
button{width:100%;margin-top:10px;padding:13px;border:none;border-radius:10px;background:#1f4e79;color:white;font-size:18px}
button.red{background:#c0392b}
button.small{width:auto;padding:6px 10px;font-size:14px;background:#e74c3c}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.box{background:#eef5fb;border-radius:12px;padding:12px;text-align:center;font-weight:bold}
.ai{background:#fff7e6;border-left:6px solid #f0a500;padding:12px;border-radius:10px;line-height:1.7}
.item{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #ddd;padding:10px 0}
small{color:#666}
.hint{font-size:14px;color:#666;line-height:1.6}
canvas{max-width:100%}
</style>
</head>

<body>

<header>小豪的記帳小幫手</header>

<div class="container">

<div class="card">
<h3>新增紀錄</h3>
<input id="input" placeholder="早餐60現 / 薪水30000玉山 / 轉帳5000玉山到台新 / 薪水14000玉山到股票帳戶">
<button onclick="add()">新增</button>
<p class="hint">
收入：薪水30000玉山<br>
支出：早餐60現、電影300台新<br>
轉帳：轉帳5000玉山到台新<br>
投資：薪水14000玉山到股票帳戶
</p>
</div>

<div class="card">
<h3>月份選擇</h3>
<select id="monthSelect" onchange="render()"></select>
</div>

<div class="card">
<h3>帳戶餘額（會延續到下個月）</h3>
<div id="assets" class="grid"></div>
</div>

<div class="card">
<h3>每月收入支出統計</h3>
<div id="summary" class="grid"></div>
</div>

<div class="card">
<h3>分類統計</h3>
<div id="category" class="grid"></div>
</div>

<div class="card">
<h3>支出圓餅圖</h3>
<canvas id="pieChart"></canvas>
</div>

<div class="card">
<h3>AI分析建議</h3>
<div id="ai" class="ai"></div>
</div>

<div class="card">
<h3>本月紀錄</h3>
<div id="list"></div>
<button class="red" onclick="clearAll()">清除全部資料</button>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("dynamicBankDataV2")) || [];
let pieChart = null;

function today(){
  return new Date().toLocaleDateString("zh-TW");
}

function monthKey(){
  let d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}

function normalizeAccount(text){
  if(!text) return "銀行";
  text = text.trim();
  if(text==="現") return "現金";
  if(text==="銀") return "銀行";
  if(text==="信") return "信用卡";
  if(text==="悠") return "悠遊卡";
  if(text==="L") return "LINE Pay";
  return text;
}

function classify(t){
  if(/早餐|午餐|晚餐|飲料|便當|咖啡|麵|飯/.test(t)) return "餐飲";
  if(/公車|捷運|高鐵|火車|交通|油錢|Uber/.test(t)) return "交通";
  if(/電影|遊戲|娛樂|Netflix|KTV/.test(t)) return "娛樂";
  if(/購物|衣服|鞋子|包包|生活用品/.test(t)) return "購物";
  if(/房租|房貸|保險|電費|水費|手機費|車貸/.test(t)) return "固定支出";
  if(/醫療|看病|藥/.test(t)) return "醫療";
  return "其他";
}

function parseBasic(text){
  let num = text.match(/\d+/);
  if(!num) return null;

  let amount = parseInt(num[0]);
  let parts = text.split(num[0]);

  let name = parts[0].trim();
  let account = normalizeAccount(parts[1]);

  return {name, amount, account};
}

function parse(t){
  let num = t.match(/\d+/);
  if(!num) return null;

  let amount = parseInt(num[0]);
  let date = today();
  let month = monthKey();

  if(t.includes("到股票帳戶")){
    let clean = t.replace("到股票帳戶","");
    let basic = parseBasic(clean);

    return {
      type:"投資",
      name:basic.name || "投入股票帳戶",
      amount,
      account:basic.account || "銀行",
      date,
      month,
      category:"投資"
    };
  }

  if(t.includes("轉帳") && t.includes("到")){
    let clean = t.replace("轉帳","").replace(amount,"");
    let parts = clean.split("到");

    return {
      type:"轉帳",
      amount,
      from:normalizeAccount(parts[0]),
      to:normalizeAccount(parts[1]),
      date,
      month
    };
  }

  let basic = parseBasic(t);
  let name = basic.name;
  let account = basic.account;

  if(/薪水|收入|獎金|打工|退款|零用錢|利息/.test(name)){
    return {type:"收入",name,amount,account,date,month};
  }

  return {
    type:"支出",
    name,
    amount,
    account,
    date,
    month,
    category:classify(name)
  };
}

function add(){
  let input = document.getElementById("input");
  let text = input.value.trim();
  let record = parse(text);

  if(!record){
    alert("格式錯誤，請輸入：早餐60現、薪水30000玉山、轉帳5000玉山到台新");
    return;
  }

  data.push(record);
  save();
  input.value="";
  updateMonthOptions();
  render();
}

function save(){
  localStorage.setItem("dynamicBankDataV2",JSON.stringify(data));
}

function clearAll(){
  if(confirm("確定清除全部資料嗎？")){
    data=[];
    save();
    updateMonthOptions();
    render();
  }
}

function del(realIndex){
  data.splice(realIndex,1);
  save();
  updateMonthOptions();
  render();
}

function updateMonthOptions(){
  let select = document.getElementById("monthSelect");
  let old = select.value;
  let months = [...new Set(data.map(d=>d.month))].sort().reverse();
  let nowMonth = monthKey();

  if(!months.includes(nowMonth)) months.unshift(nowMonth);

  select.innerHTML="";
  months.forEach(m=>{
    let opt=document.createElement("option");
    opt.value=m;
    opt.textContent=m;
    select.appendChild(opt);
  });

  select.value = months.includes(old) ? old : nowMonth;
}

function selectedMonth(){
  return document.getElementById("monthSelect").value;
}

function monthlyData(){
  let m = selectedMonth();
  return data.map((d,i)=>({...d,realIndex:i})).filter(d=>d.month===m);
}

function getAllTimeAssets(){
  let acc = {};

  function addAcc(a){
    if(!acc[a]) acc[a]=0;
  }

  data.forEach(d=>{
    if(d.type==="收入"){
      addAcc(d.account);
      acc[d.account]+=d.amount;
    }

    if(d.type==="支出"){
      addAcc(d.account);
      acc[d.account]-=d.amount;
    }

    if(d.type==="轉帳"){
      addAcc(d.from);
      addAcc(d.to);
      acc[d.from]-=d.amount;
      acc[d.to]+=d.amount;
    }

    if(d.type==="投資"){
  addAcc(d.account);
  addAcc("股票帳戶");

  acc[d.account]-=d.amount;
  acc["股票帳戶"]+=d.amount;
}
  return {acc,stock};
}

function renderAssets(){
  let {acc,stock} = getAllTimeAssets();
  let totalAccount = Object.values(acc).reduce((s,v)=>s+v,0);
  let totalAsset = totalAccount;;

  let html = "";

  Object.keys(acc).forEach(k=>{
    html += `<div class="box">${k}<br>${acc[k]}元</div>`;
  });
  
  html += `<div class="box">總資產<br>${totalAsset}元</div>`;

  document.getElementById("assets").innerHTML = html || "<p>目前沒有帳戶資料</p>";
}

function getMonthStats(){
  let f = monthlyData();

  let income = f.filter(d=>d.type==="收入").reduce((s,d)=>s+d.amount,0);
  let expense = f.filter(d=>d.type==="支出").reduce((s,d)=>s+d.amount,0);
  let invest = f.filter(d=>d.type==="投資").reduce((s,d)=>s+d.amount,0);
  let transfer = f.filter(d=>d.type==="轉帳").reduce((s,d)=>s+d.amount,0);
  let balance = income - expense - invest;

  return {income,expense,invest,transfer,balance};
}

function renderSummary(){
  let s = getMonthStats();

  document.getElementById("summary").innerHTML = `
    <div class="box">本月收入<br>${s.income}元</div>
    <div class="box">本月支出<br>${s.expense}元</div>
    <div class="box">本月投資<br>${s.invest}元</div>
    <div class="box">本月轉帳<br>${s.transfer}元</div>
    <div class="box">本月結餘<br>${s.balance}元</div>
  `;
}

function getCategoryTotals(){
  let f = monthlyData();
  let cats = {
    餐飲:0,
    交通:0,
    娛樂:0,
    購物:0,
    固定支出:0,
    醫療:0,
    其他:0,
    投資:0
  };

  f.forEach(d=>{
    if(d.type==="支出") cats[d.category]+=d.amount;
    if(d.type==="投資") cats["投資"]+=d.amount;
  });

  return cats;
}

function renderCategory(){
  let cats = getCategoryTotals();
  let html = "";

  Object.keys(cats).forEach(c=>{
    html += `<div class="box">${c}<br>${cats[c]}元</div>`;
  });

  document.getElementById("category").innerHTML = html;
}

function renderChart(){
  let cats = getCategoryTotals();
  let labels = [];
  let values = [];

  Object.keys(cats).forEach(c=>{
    if(cats[c]>0){
      labels.push(c);
      values.push(cats[c]);
    }
  });

  if(pieChart) pieChart.destroy();

  if(values.length===0) return;

  pieChart = new Chart(document.getElementById("pieChart"),{
    type:"pie",
    data:{
      labels:labels,
      datasets:[{data:values}]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{position:"bottom"}
      }
    }
  });
}

function renderAI(){
  let cats = getCategoryTotals();
  let expenseCats = Object.keys(cats).filter(c=>c!=="投資");

  let maxCat="無";
  let maxVal=0;

  expenseCats.forEach(c=>{
    if(cats[c]>maxVal){
      maxVal=cats[c];
      maxCat=c;
    }
  });

  let totalExpense = expenseCats.reduce((s,c)=>s+cats[c],0);

  if(totalExpense===0){
    document.getElementById("ai").innerHTML="本月尚無支出資料，請先新增紀錄。";
    return;
  }

  let percent = Math.round(maxVal/totalExpense*100);
  let advice = percent>=50
    ? `建議減少「${maxCat}」支出，避免單一類別花費過高。`
    : "目前支出結構正常，請持續保持。";

  document.getElementById("ai").innerHTML = `
    本月最大支出類別：<b>${maxCat}</b><br>
    金額：<b>${maxVal}元</b><br>
    佔本月支出：約 <b>${percent}%</b><br>
    AI建議：${advice}
  `;
}

function renderList(){
  let f = monthlyData();
  let html = "";

  f.forEach(d=>{
    let text = "";

    if(d.type==="收入") text=`收入｜${d.name}｜${d.amount}元｜${d.account}`;
    if(d.type==="支出") text=`支出｜${d.name}｜${d.amount}元｜${d.category}｜${d.account}`;
    if(d.type==="轉帳") text=`轉帳｜${d.amount}元｜${d.from} → ${d.to}`;
    if(d.type==="投資") text=`投資｜股票帳戶 +${d.amount}元｜${d.account}扣款`;

    html += `
      <div class="item">
        <div>
          <b>${text}</b><br>
          <small>${d.date}</small>
        </div>
        <button class="small" onclick="del(${d.realIndex})">刪除</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html || "<p>本月沒有紀錄</p>";
}

function render(){
  renderAssets();
  renderSummary();
  renderCategory();
  renderChart();
  renderAI();
  renderList();
}

updateMonthOptions();
render();
</script>

</body>
</html>
