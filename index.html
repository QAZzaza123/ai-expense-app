<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小豪的記帳小幫手</title>

<style>
body{margin:0;font-family:Arial;background:#f4f7fb}
header{background:#1f4e79;color:white;padding:15px;text-align:center}
.container{padding:15px}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:10px}
input{width:100%;padding:10px;margin-bottom:10px}
button{width:100%;padding:10px;background:#1f4e79;color:white;border:none}
.box{background:#eef5fb;padding:10px;margin:5px;border-radius:8px;text-align:center}
</style>
</head>

<body>

<header>小豪的記帳小幫手</header>

<div class="container">

<div class="card">
<input id="input" placeholder="早餐60現 / 薪水30000銀 / 轉帳1000銀到現 / 薪水14000到股票帳戶">
<button onclick="add()">新增</button>
</div>

<div class="card">
<h3>資產</h3>
<div id="assets"></div>
</div>

<div class="card">
<h3>紀錄</h3>
<div id="list"></div>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("fixData")) || [];

function accName(c){
 if(c=="現") return "現金";
 if(c=="銀") return "銀行";
 return "銀行";
}

function parse(t){
 let num=t.match(/\d+/);
 if(!num) return null;
 let amount=parseInt(num[0]);

 // 股票投入
 if(t.includes("到股票帳戶")){
   let acc = t.includes("現") ? "現金" : "銀行";
   return {type:"投資",amount,account:acc};
 }

 // 轉帳
 if(t.includes("轉帳") && t.includes("到")){
   let from = t.includes("現") ? "現金" : "銀行";
   let to = t.includes("到現") ? "現金" : "銀行";
   return {type:"轉帳",amount,from,to};
 }

 // 收入
 if(t.includes("薪水")){
   let acc = t.includes("現") ? "現金" : "銀行";
   return {type:"收入",amount,account:acc};
 }

 // 支出
 let acc = t.includes("現") ? "現金" : "銀行";
 return {type:"支出",amount,account:acc};
}

function add(){
 let text=document.getElementById("input").value;
 let r=parse(text);
 if(!r){alert("格式錯誤");return;}

 data.push(r);
 localStorage.setItem("fixData",JSON.stringify(data));
 render();
}

function render(){
 let acc={現金:0,銀行:0};
 let stock=0;

 let list="";

 data.forEach(d=>{
   if(d.type=="收入") acc[d.account]+=d.amount;
   if(d.type=="支出") acc[d.account]-=d.amount;
   if(d.type=="轉帳"){
     acc[d.from]-=d.amount;
     acc[d.to]+=d.amount;
   }
   if(d.type=="投資"){
     acc[d.account]-=d.amount;
     stock+=d.amount;
   }

   list+=`<div>${d.type} ${d.amount}</div>`;
 });

 document.getElementById("list").innerHTML=list;

 let total = acc.現金 + acc.銀行 + stock;

 document.getElementById("assets").innerHTML=
 `
 <div class="box">現金 ${acc.現金}</div>
 <div class="box">銀行 ${acc.銀行}</div>
 <div class="box">股票 ${stock}</div>
 <div class="box">總資產 ${total}</div>
 `;
}

render();
</script>

</body>
</html>
